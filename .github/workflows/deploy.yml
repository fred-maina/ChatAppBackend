name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: chatapp
  APP_DIR: /home/${{ secrets.EC2_USER }}/chatapp
  APP_PORT: '8080'
  SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY || secrets.EC2_SSH_KEY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build application
        run: ./mvnw clean package -DskipTests

      - name: Prepare deployment bundle
        run: |
          mkdir -p deploy
          cp target/*.jar deploy/app.jar
          cp scripts/setup_nginx.sh deploy/setup_nginx.sh
          cp scripts/setup_postgres.sh deploy/setup_postgres.sh
          cp scripts/setup_redis.sh deploy/setup_redis.sh
          cp scripts/check_app_health.sh deploy/check_app_health.sh

      - name: Validate deployment secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        run: |
          missing=()

          [[ -n "${EC2_HOST}" ]] || missing+=("EC2_HOST")
          [[ -n "${EC2_USER}" ]] || missing+=("EC2_USER")
          [[ -n "${SSH_PRIVATE_KEY}" ]] || missing+=("EC2_SSH_PRIVATE_KEY")
          [[ -n "${DOMAIN_NAME}" ]] || missing+=("DOMAIN_NAME")
          [[ -n "${CERTBOT_EMAIL}" ]] || missing+=("CERTBOT_EMAIL")

          if [[ "${#missing[@]}" -gt 0 ]]; then
            echo "Missing required GitHub Secrets: ${missing[*]}"
            echo "Set EC2_SSH_PRIVATE_KEY to the full private key, including BEGIN/END lines."
            exit 1
          fi

      - name: Copy deployment bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          source: deploy/*
          target: ${{ env.APP_DIR }}
          strip_components: 1

      - name: Deploy application and configure Nginx
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ env.APP_DIR }}
          APP_NAME: ${{ env.APP_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          APP_CONFIG_DIR: /opt/myapp
          APP_ENV_FILE: /opt/myapp/.env
          REDIS_ENV_FILE: /opt/myapp/redis.env
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          envs: APP_DIR,APP_NAME,APP_PORT,APP_CONFIG_DIR,APP_ENV_FILE,REDIS_ENV_FILE,DOMAIN_NAME,CERTBOT_EMAIL,DB_HOST,DB_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD
          script_stop: true
          script: |
            set -euo pipefail
            CURRENT_STEP="initializing deployment"

            log_step() {
              CURRENT_STEP="$1"
              echo "==> ${CURRENT_STEP}"
            }

            trap 'echo "ERROR: deployment failed during: ${CURRENT_STEP}" >&2' ERR

            log_step "preparing deployment directory"
            mkdir -p "${APP_DIR}"
            chmod +x "${APP_DIR}/setup_nginx.sh" "${APP_DIR}/setup_postgres.sh" "${APP_DIR}/setup_redis.sh" "${APP_DIR}/check_app_health.sh"
            REMOTE_USER="$(id -un)"
            APP_SECRETS_FILE="${APP_DIR}/.env"

            log_step "validating domain name"
            if [[ "${DOMAIN_NAME}" == http://* || "${DOMAIN_NAME}" == https://* || "${DOMAIN_NAME}" == */* ]]; then
              echo "DOMAIN_NAME must be a hostname only, for example chat.fredmaina.com. Do not include http:// or https://."
              exit 1
            fi

            env_file_has_value() {
              local file_path="$1"
              local key="$2"

              sudo awk -F= -v key="${key}" '
                $0 ~ "^[[:space:]]*(export[[:space:]]+)?" key "[[:space:]]*=" {
                  sub(/^[^=]*=/, "")
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "")
                  gsub(/^'\''|'\''$/, "")
                  gsub(/^"|"$/, "")
                  if (length($0) > 0) {
                    found = 1
                  }
                }
                END { exit found ? 0 : 1 }
              ' "${file_path}"
            }

            require_env_keys() {
              local file_path="$1"
              shift
              local missing_keys=()
              local key

              if ! sudo test -f "${file_path}"; then
                echo "Missing required environment file: ${file_path}"
                return 1
              fi

              for key in "$@"; do
                if ! env_file_has_value "${file_path}" "${key}"; then
                  missing_keys+=("${key}")
                fi
              done

              if [[ "${#missing_keys[@]}" -gt 0 ]]; then
                echo "Missing required environment variables in ${file_path}: ${missing_keys[*]}"
                return 1
              fi

              echo "Validated required environment variables in ${file_path}."
            }

            log_step "checking Java runtime"
            if ! dpkg-query -W -f='${Status}' openjdk-21-jre-headless 2>/dev/null | grep -q "install ok installed"; then
              sudo apt-get update
              sudo env NEEDRESTART_MODE=a DEBIAN_FRONTEND=noninteractive apt-get install -y openjdk-21-jre-headless
            fi

            log_step "configuring PostgreSQL"
            if [[ -n "${DB_HOST:-}" && -n "${DB_PORT:-}" && -n "${DB_NAME:-}" && -n "${DB_USERNAME:-}" && -n "${DB_PASSWORD:-}" ]]; then
              echo "Using external PostgreSQL configuration from GitHub Secrets."
              sudo mkdir -p "${APP_CONFIG_DIR}"
              sudo tee "${APP_ENV_FILE}" >/dev/null <<DBENV
            DB_HOST=${DB_HOST}
            DB_PORT=${DB_PORT}
            DB_NAME=${DB_NAME}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
            SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
            SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
            DBENV
              sudo chmod 600 "${APP_ENV_FILE}"
            else
              echo "Using local PostgreSQL container."
              echo "Checking local PostgreSQL setup script at ${APP_DIR}/setup_postgres.sh"
              if ! test -x "${APP_DIR}/setup_postgres.sh"; then
                echo "Local PostgreSQL setup script is missing or not executable: ${APP_DIR}/setup_postgres.sh"
                echo "Deployment directory contents:"
                ls -la "${APP_DIR}" | awk '{print $1, $3, $4, $9}'
                exit 1
              fi

              if ! env -u DB_PASSWORD \
                APP_CONFIG_DIR="${APP_CONFIG_DIR}" \
                APP_ENV_FILE="${APP_ENV_FILE}" \
                DB_HOST="127.0.0.1" \
                DB_PORT="5432" \
                DB_NAME="myapp" \
                DB_USERNAME="myapp_user" \
                bash "${APP_DIR}/setup_postgres.sh"; then
                  echo "Local PostgreSQL setup failed."
                  echo "SSH into the server and run: bash ${APP_DIR}/setup_postgres.sh"
                  exit 1
              fi
            fi

            log_step "configuring Redis"
            if [[ -n "${REDIS_HOST:-}" && -n "${REDIS_PORT:-}" && -n "${REDIS_PASSWORD:-}" ]]; then
              echo "Using external Redis configuration from GitHub Secrets."
              sudo mkdir -p "${APP_CONFIG_DIR}"
              sudo tee "${REDIS_ENV_FILE}" >/dev/null <<REDISENV
            REDIS_HOST=${REDIS_HOST}
            REDIS_PORT=${REDIS_PORT}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            REDISENV
              sudo chmod 600 "${REDIS_ENV_FILE}"
            else
              echo "Using local Redis container."
              echo "Checking local Redis setup script at ${APP_DIR}/setup_redis.sh"
              if ! test -x "${APP_DIR}/setup_redis.sh"; then
                echo "Local Redis setup script is missing or not executable: ${APP_DIR}/setup_redis.sh"
                echo "Deployment directory contents:"
                ls -la "${APP_DIR}" | awk '{print $1, $3, $4, $9}'
                exit 1
              fi

              if ! env -u REDIS_PASSWORD \
                APP_CONFIG_DIR="${APP_CONFIG_DIR}" \
                REDIS_ENV_FILE="${REDIS_ENV_FILE}" \
                REDIS_HOST="127.0.0.1" \
                REDIS_PORT="6379" \
                bash "${APP_DIR}/setup_redis.sh"; then
                  echo "Local Redis setup failed."
                  echo "SSH into the server and run: bash ${APP_DIR}/setup_redis.sh"
                  exit 1
              fi
            fi

            log_step "validating server app environment"
            require_env_keys "${APP_SECRETS_FILE}" \
              JWT_SECRET \
              GOOGLE_CLIENT_ID \
              GOOGLE_SECRET_ID \
              GOOGLE_REDIRECT_URI

            log_step "validating datasource environment"
            require_env_keys "${APP_ENV_FILE}" \
              SPRING_DATASOURCE_URL \
              SPRING_DATASOURCE_USERNAME \
              SPRING_DATASOURCE_PASSWORD

            log_step "validating Redis environment"
            require_env_keys "${REDIS_ENV_FILE}" \
              REDIS_HOST \
              REDIS_PORT \
              REDIS_PASSWORD

            log_step "writing systemd service"
            sudo tee /etc/systemd/system/${APP_NAME}.service >/dev/null <<SERVICE
            [Unit]
            Description=ChatApp Spring Boot service
            After=network.target docker.service
            Wants=docker.service

            [Service]
            Type=simple
            WorkingDirectory=${APP_DIR}
            Environment=SERVER_PORT=${APP_PORT}
            EnvironmentFile=-${APP_DIR}/.env
            EnvironmentFile=${APP_ENV_FILE}
            EnvironmentFile=${REDIS_ENV_FILE}
            ExecStart=/usr/bin/java -jar ${APP_DIR}/app.jar
            Restart=always
            RestartSec=10
            User=${REMOTE_USER}

            [Install]
            WantedBy=multi-user.target
            SERVICE

            log_step "starting application service"
            sudo systemctl daemon-reload
            sudo systemctl enable ${APP_NAME}
            if ! sudo systemctl restart ${APP_NAME}; then
              echo "Application service failed to restart. SSH into the server and run: sudo journalctl -u ${APP_NAME} -n 100 --no-pager"
              exit 1
            fi

            sleep 5
            if ! sudo systemctl is-active --quiet ${APP_NAME}; then
              echo "Application service is not active after restart. SSH into the server and run: sudo journalctl -u ${APP_NAME} -n 100 --no-pager"
              exit 1
            fi

            echo "Application service restarted and is active."
            log_step "checking local application health"
            bash "${APP_DIR}/check_app_health.sh" "http://localhost:${APP_PORT}/actuator/health"

            log_step "configuring Nginx and HTTPS"
            DOMAIN_NAME="${DOMAIN_NAME}" CERTBOT_EMAIL="${CERTBOT_EMAIL}" APP_PORT="${APP_PORT}" bash "${APP_DIR}/setup_nginx.sh"
            log_step "checking public HTTPS application health"
            bash "${APP_DIR}/check_app_health.sh" "https://${DOMAIN_NAME}/actuator/health"
