spring.datasource.url=jdbc:h2:mem:chatapp;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,org.springframework.boot.actuate.autoconfigure.data.redis.RedisReactiveHealthContributorAutoConfiguration

jwt.secret=test-secret-key-with-at-least-32-chars
jwt.expiration=86400000

security.allowed-origins=http://localhost:3000
security.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
security.allowed-headers=Authorization,Content-Type,Accept
security.public-endpoints=/api/auth/register,/api/auth/login,/ws/**,/actuator/health

google.client-id=test-client-id
google.client-secret=test-client-secret
google.redirect-uri=http://localhost/oauth
google.token-uri=https://oauth2.googleapis.com/token
google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo

spring.data.redis.host=localhost
spring.data.redis.port=6379
management.health.redis.enabled=false
